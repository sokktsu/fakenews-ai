version: '3.9'

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fakenews_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fakenews_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fakenews_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql://postgres:postgres_password@db:5432/fakenews_db
      SECRET_KEY:        change-this-secret-key-in-production
      ALLOWED_ORIGINS:   http://localhost:3000
      BERT_MODEL_PATH:   /app/ai_models/bert/saved_model
      LSTM_MODEL_PATH:   /app/ai_models/lstm/saved_model
      LOGISTIC_MODEL_PATH: /app/ai_models/logistic_regression/saved_model
    volumes:
      - ./ai_models:/app/ai_models
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fakenews_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:

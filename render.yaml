services:
  - type: web
    name: fakenews-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('stopwords'); nltk.download('punkt'); nltk.download('wordnet')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fakenews-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: BERT_WEIGHT
        value: "0.30"
      - key: ROBERTA_WEIGHT
        value: "0.25"
      - key: BERT_MULTILINGUAL_WEIGHT
        value: "0.20"
      - key: LSTM_WEIGHT
        value: "0.15"
      - key: LOGISTIC_WEIGHT
        value: "0.10"
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: fakenews-db
    databaseName: fakenews_db
    user: fakenews_user
    plan: free
